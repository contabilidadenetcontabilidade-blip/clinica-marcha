<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Profissionais - Marcha</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pacientes.css"> <!-- Reuse styles -->
    <script src="auth_guard.js"></script>
</head>

<body>
    <header class="global-navbar"
        style="background: #000033; color: white; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
        <div class="nav-brand" style="display: flex; align-items: center; gap: 15px; cursor: pointer;"
            onclick="window.location.href='index.html'">
            <img src="../assets/logo_marcha.png" alt="Logo"
                style="height: 40px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));">
            <span style="font-size: 1.2rem; font-weight: bold; letter-spacing: 1px;">Marcha</span>
        </div>
        <nav class="nav-links" style="display: flex; gap: 20px; align-items: center;">
            <a href="pacientes.html"
                style="color: #ccc; text-decoration: none; font-weight: 500; font-size: 1rem; transition: 0.2s;">Pacientes</a>
            <a href="agenda.html"
                style="color: #ccc; text-decoration: none; font-weight: 500; font-size: 1rem; transition: 0.2s;">Agenda</a>
            <a href="profissionais.html"
                style="color: white; text-decoration: none; font-weight: 600; font-size: 1rem; border-bottom: 2px solid #FFD700;">Profissionais</a>
            <a href="financeiro.html"
                style="color: #ccc; text-decoration: none; font-weight: 500; font-size: 1rem; transition: 0.2s;">Financeiro</a>
            <a href="cup.html"
                style="color: #ccc; text-decoration: none; font-weight: 500; font-size: 1rem; transition: 0.2s;">Marcha
                Cup</a>
            <button onclick="doLogoff()"
                style="background: #e53935; color: white; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-left: 10px; transition: 0.2s;">Sair</button>
        </nav>
    </header>
    <script>
        function doLogoff() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>

    <main class="container">
        <div class="header-action">
            <h2>Equipe de Profissionais</h2>
            <button class="btn-primary" onclick="openNewProfessional()">+ Novo Profissional</button>
        </div>

        <ul id="professionals-list" class="patient-list">
            <!-- List -->
        </ul>
    </main>

    <!-- Modal -->
    <div id="modal-professional" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Novo Profissional</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <form id="form-professional">
                <input type="hidden" name="id" id="prof-id">

                <div class="form-group">
                    <label>Nome Completo *</label>
                    <input type="text" name="name" id="prof-name" required>
                </div>

                <div class="form-row" style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Especialidade</label>
                        <select name="specialty" id="prof-specialty">
                            <option value="Fisioterapia">Fisioterapia</option>
                            <option value="Pilates">Pilates</option>
                            <option value="Osteopatia">Osteopatia</option>
                            <option value="Acupuntura">Acupuntura</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>

                    <div class="form-group" style="flex: 1;">
                        <label>Registro Profissional (ex: CREFITO)</label>
                        <input type="text" name="registration_number" id="prof-registration" placeholder="Ex: 123456-F">
                    </div>
                </div>

                <div class="form-group">
                    <label>Cor de Exibição na Agenda</label>
                    <input type="color" name="color" id="prof-color" value="#2196F3"
                        style="width: 100px; height: 40px; padding: 2px;">
                </div>

                <div class="form-actions" style="margin-top: 15px;">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="profissionais.js"></script>
</body>

</html>
