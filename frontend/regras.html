<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Regras de Pontuação - Marcha Cup</title>
  <link rel="stylesheet" href="regras.css">
  <link rel="stylesheet" href="css/cards-style.css">
  <script src="auth_guard.js"></script>
</head>

<body>
  <header class="topbar">
    <button class="back-btn" onclick="window.location.href='cup.html'">←</button>
    <span>Regras de Pontuação</span>
    <a href="/manual/Manual Marcha Cup 2026.pdf" target="_blank"
      style="margin-left: auto; color: #FFD700; text-decoration: none; font-weight: bold; font-size: 0.9rem;">
      📖 Manual Completo
    </a>
  </header>


  <main>
    <section class="card">
      <h2>Regras Ativas</h2>
      <ul id="rules-list"></ul>
    </section>

    <section class="card">
      <h2>Baralho de Poder - Catálogo</h2>
      <div id="deck-catalog" class="cards-catalog-grid">
        <!-- As cartas serão renderizadas aqui pelo regras.js -->
        <p style="text-align: center; color: #666;">Carregando o baralho...</p>
      </div>
    </section>

    <section class="card">
      <h2>Nova Regra</h2>
      <form id="form-rule">
        <label>Nome da Regra:</label>
        <input name="name" required>

        <label>Valor em pontos (pode ser negativo):</label>
        <input name="value" type="number" required>

        <button type="submit">Salvar</button>
      </form>
    </section>
  </main>

  <script src="utils.js?v=2"></script>
  <script src="regras.js?v=2"></script>
  <script src="js/cards-viewer.js?v=2"></script>
</body>

</html>
