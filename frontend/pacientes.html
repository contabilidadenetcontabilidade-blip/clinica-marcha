<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Pacientes - Marcha</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="pacientes.css">
  <script src="auth_guard.js"></script>
</head>

<body>
  <header class="global-navbar"
    style="background: #000033; color: white; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
    <div class="nav-brand" style="display: flex; align-items: center; gap: 15px; cursor: pointer;"
      onclick="window.location.href='index.html'">
      <img src="../assets/logo_marcha.png" alt="Logo"
        style="height: 40px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));">
      <span style="font-size: 1.2rem; font-weight: bold; letter-spacing: 1px;">Marcha</span>
    </div>
    <nav class="nav-links" style="display: flex; gap: 20px; align-items: center;">
      <a href="pacientes.html"
        style="color: white; text-decoration: none; font-weight: 600; font-size: 1rem; border-bottom: 2px solid #FFD700;">Pacientes</a>
      <a href="agenda.html"
        style="color: #ccc; text-decoration: none; font-weight: 500; font-size: 1rem; transition: 0.2s;">Agenda</a>
      <a href="profissionais.html"
        style="color: #ccc; text-decoration: none; font-weight: 500; font-size: 1rem; transition: 0.2s;">Profissionais</a>
      <a href="financeiro.html"
        style="color: #ccc; text-decoration: none; font-weight: 500; font-size: 1rem; transition: 0.2s;">Financeiro</a>
      <a href="cup.html"
        style="color: #ccc; text-decoration: none; font-weight: 500; font-size: 1rem; transition: 0.2s;">Marcha Cup</a>
      <button onclick="doLogoff()"
        style="background: #e53935; color: white; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-left: 10px; transition: 0.2s;">Sair</button>
    </nav>
  </header>
  <script>
    function doLogoff() {
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }
  </script>

  <main>
    <div class="page-header">
      <h1>Cadastro de Pacientes</h1>
      <button class="btn-primary" onclick="openNewPatient()">+ Novo Paciente</button>
    </div>

    <section class="card search-section">
      <div class="tabs-container" style="margin-bottom: 15px; display: flex; gap: 10px;">
        <button id="tab-students" class="tab-btn active" onclick="switchTab('student')">👨‍🎓 Alunos /
          Pacientes</button>
        <button id="tab-team" class="tab-btn" onclick="switchTab('team')">👔 Equipe / Profissionais</button>
      </div>

      <input type="text" id="search-input" placeholder="Buscar por nome, CPF ou telefone..." onkeyup="searchPatients()">
      <label class="filter-active">
        <input type="checkbox" id="filter-active" checked onchange="loadPatients()">
        Mostrar apenas ativos
      </label>
    </section>

    <section class="card">
      <div id="patients-list-container">
        <ul id="patients-list">
          <li>Carregando pacientes...</li>
        </ul>
      </div>
    </section>
  </main>

  <!-- Modal Novo/Editar Paciente -->
  <div id="modal-patient" class="modal hidden">
    <div class="modal-content modal-large">
      <h3 id="modal-patient-title">Novo Paciente</h3>
      <form id="form-patient">
        <input type="hidden" id="patient-id" name="id">

        <div class="form-row">
          <div class="form-group">
            <label>Nome Completo *</label>
            <input type="text" id="patient-name" name="name" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>CPF</label>
            <input type="text" id="patient-cpf" name="cpf" placeholder="000.000.000-00">
          </div>
          <div class="form-group">
            <label>Data de Nascimento</label>
            <input type="date" id="patient-birth_date" name="birth_date">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Telefone</label>
            <input type="tel" id="patient-phone" name="phone" placeholder="(00) 00000-0000">
          </div>
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="patient-email" name="email">
          </div>
        </div>

        <div class="form-group">
          <label>Endereço</label>
          <input type="text" id="patient-address" name="address">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Cidade</label>
            <input type="text" id="patient-city" name="city">
          </div>
          <div class="form-group">
            <label>Estado</label>
            <input type="text" id="patient-state" name="state" maxlength="2" placeholder="SP">
          </div>
          <div class="form-group">
            <label>CEP</label>
            <input type="text" id="patient-zip_code" name="zip_code" placeholder="00000-000">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Contato de Emergência</label>
            <input type="text" id="patient-emergency_contact" name="emergency_contact">
          </div>
          <div class="form-group">
            <label>Telefone de Emergência</label>
            <input type="tel" id="patient-emergency_phone" name="emergency_phone">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Convênio</label>
            <select id="patient-health_insurance" name="health_insurance">
              <option value="">Selecione...</option>
              <option value="Particular">Particular</option>
              <option value="Gympass">Gympass</option>
              <option value="TotalPass">TotalPass</option>
              <option value="ClassPass">ClassPass</option>
              <option value="Outro">Outro</option>
            </select>
          </div>
        </div>
 
         <div class="form-row">
           <div class="form-group">
             <label>Casa na Marcha Cup <span style="color:red">*</span></label>
             <select id="patient-house_id" name="house_id" required>
               <option value="">Selecione a Casa...</option>
             </select>
           </div>
         </div>

        <div class="form-group">
          <label>Observações</label>
          <textarea id="patient-notes" name="notes" rows="3"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Salvar</button>
          <button type="button" class="btn-secondary" onclick="closePatientModal()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="pacientes.js"></script>
</body>

</html>
