<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Marcha Reabilitação e Perícia</title>
  <link rel="stylesheet" href="style.css" />
  <script src="auth_guard.js"></script>

</head>

<body>

  <header class="global-navbar"
    style="background: #000033; color: white; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
    <div class="nav-brand" style="display: flex; align-items: center; gap: 15px; cursor: pointer;"
      onclick="window.location.href='index.html'">
      <img src="../assets/logo_marcha.png" alt="Logo"
        style="height: 40px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));">
      <span style="font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; color: #FFD700;">Dashboard</span>
    </div>
    <nav class="nav-links" style="display: flex; gap: 20px; align-items: center;">
      <a href="pacientes.html"
        style="color: white; text-decoration: none; font-weight: 500; font-size: 1rem; transition: 0.2s;">Pacientes</a>
      <a href="agenda.html"
        style="color: white; text-decoration: none; font-weight: 500; font-size: 1rem; transition: 0.2s;">Agenda</a>
      <a href="financeiro.html"
        style="color: white; text-decoration: none; font-weight: 500; font-size: 1rem; transition: 0.2s;">Financeiro</a>
      <a href="cup.html"
        style="color: white; text-decoration: none; font-weight: 500; font-size: 1rem; transition: 0.2s;">Marcha Cup</a>
      <button id="btn-settings" onclick="openPasswordModal()" 
        style="background: #1565C0; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s;">⚙️ Perfil</button>
      <button onclick="doLogoff()"
        style="background: #e53935; color: white; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-left: 10px; transition: 0.2s;">Sair</button>
    </nav>
  </header>
  <script>
    function doLogoff() {
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }
  </script>

  <main>

    <section class="card agenda">
      <h2>📅 Agenda de Hoje</h2>
      <ul id="agenda-list" style="list-style: none; padding: 0;"></ul>
    </section>

    <section class="card financeiro">
      <h2>💰 Financeiro do Dia</h2>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;">
        <div style="background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%); padding: 16px; border-radius: 12px;">
          <div style="font-size: 0.9rem; color: #2E7D32; margin-bottom: 8px; font-weight: 600;">Previsto</div>
          <div style="font-size: 1.5rem; font-weight: 700; color: #1B5E20;" id="previsto-display">R$ 0,00</div>
        </div>
        <div style="background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%); padding: 16px; border-radius: 12px;">
          <div style="font-size: 0.9rem; color: #1565C0; margin-bottom: 8px; font-weight: 600;">Recebido</div>
          <div style="font-size: 1.5rem; font-weight: 700; color: #0D47A1;" id="recebido-display">R$ 0,00</div>
        </div>
      </div>
    </section>

    <button id="btn-cup" class="cup-btn">
      🏆 Marcha Cup
    </button>

    <button onclick="document.getElementById('excel-upload').click()" class="cup-btn"
      style="background-color: #4CAF50; margin-top: 10px;">
      📊 Importar Planilha
    </button>
    <a href="/api/admin/export-template"
      style="display: block; text-align: center; color: #4CAF50; font-size: 0.9rem; margin-top: 5px; text-decoration: underline;">Baixar
      Modelo de Planilha</a>
    <input type="file" id="excel-upload" accept=".xlsx, .xls" style="display: none;"
      onchange="uploadExcelPoints(event)">

    <section class="card prazos">
      <h2>⏰ Prazos Urgentes</h2>
      <ul>
        <li style="padding: 12px; background: var(--light-gray); border-radius: 8px; color: #666;">Nenhum prazo próximo
          🎯</li>
      </ul>
    </section>

    <nav class="menu">
      <button onclick="window.location.href='agenda.html'" title="Agenda">
        <span style="font-size: 1.3rem;">🏋️‍♀️</span>
        <span>Agenda</span>
      </button>
      <button onclick="window.location.href='pacientes.html'" title="Pacientes">
        <span style="font-size: 1.3rem;">🧍</span>
        <span>Pacientes</span>
      </button>
      <button onclick="window.location.href='financeiro.html'" title="Financeiro">
        <span style="font-size: 1.3rem;">💰</span>
        <span>Financeiro</span>
      </button>
      <button onclick="window.location.href='cup.html'" title="Marcha Cup">
        <span style="font-size: 1.3rem;">🏆</span>
        <span>Cup</span>
      </button>

    </nav>


  </main>

  <!-- MODAL ALTERAR SENHA -->
  <div id="passwordModal" class="modal hidden">
    <div class="modal-content" style="max-width: 400px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <h3 style="margin: 0; color: #000033;">Alterar Minha Senha</h3>
            <button onclick="closePasswordModal()" style="background:none; border:none; font-size: 20px; cursor:pointer;">&times;</button>
        </div>
        <form id="changePasswordForm" onsubmit="submitPasswordChange(event)" style="display: flex; flex-direction: column; gap: 15px;">
            <div>
                <label style="display: block; font-size: 0.9rem; color: #666;">Senha Atual:</label>
                <input type="password" id="current_password" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; margin-top: 5px;">
            </div>
            <div>
                <label style="display: block; font-size: 0.9rem; color: #666;">Nova Senha:</label>
                <input type="password" id="new_password" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; margin-top: 5px;">
            </div>
            <button type="submit" style="background: #1565C0; color: white; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px;">Salvar Alteração</button>
        </form>
    </div>
  </div>

  <script>
    async function uploadExcelPoints(event) {
      const file = event.target.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch('/api/admin/import-points', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();

        if (res.ok) {
          alert(data.message);
        } else {
          let errs = data.details ? "\\n" + data.details.join('\\n') : "";
          alert("Erro: " + data.error + errs);
        }
      } catch (err) {
        alert("Erro ao enviar planilha: " + err.message);
      }
      event.target.value = ''; // Reset para poder enviar de novo se precisar
    }
  </script>
  <script>
    function openPasswordModal() {
        document.getElementById('passwordModal').classList.remove('hidden');
    }
    function closePasswordModal() {
        document.getElementById('passwordModal').classList.add('hidden');
    }
    async function submitPasswordChange(event) {
        event.preventDefault();
        const user = JSON.parse(localStorage.getItem('user'));
        const currentPassword = document.getElementById('current_password').value;
        const newPassword = document.getElementById('new_password').value;

        try {
            const res = await fetch('/api/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: user.id, currentPassword, newPassword })
            });
            const data = await res.json();
            if (res.ok) {
                alert("Senha alterada com sucesso!");
                closePasswordModal();
            } else {
                alert("Erro: " + data.error);
            }
        } catch (err) {
            alert("Erro de conexão.");
        }
    }
  </script>
  <script src="app.js"></script>
</body>

</html>
