<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Metas - Marcha Cup</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #000033; border-bottom: 2px solid #FFD700; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #000033; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #000055; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .btn-back { background: #666; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn-back" onclick="window.location.href='cup.html'">← Voltar</button>
        <h1>🎯 Definir Metas Mensais</h1>
        
        <form id="form-meta">
            <div class="form-group">
                <label>Casa:</label>
                <select id="house-select" name="house_id" required>
                    <option value="">Carregando casas...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Mês:</label>
                <select name="month" required>
                    <option value="01">Janeiro</option>
                    <option value="02">Fevereiro</option>
                    <option value="03">Março</option>
                    <option value="04">Abril</option>
                    <option value="05">Maio</option>
                    <option value="06">Junho</option>
                    <option value="07">Julho</option>
                    <option value="08">Agosto</option>
                    <option value="09">Setembro</option>
                    <option value="10">Outubro</option>
                    <option value="11">Novembro</option>
                    <option value="12">Dezembro</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ano:</label>
                <input type="number" name="year" value="2026" required>
            </div>
            <div class="form-group">
                <label>Meta (Quantidade de Meinhas):</label>
                <input type="number" name="target" placeholder="Ex: 250" required>
            </div>
            <button type="submit">Salvar Meta</button>
        </form>

        <hr>

        <h2>Metas Cadastradas</h2>
        <table id="metas-table">
            <thead>
                <tr>
                    <th>Casa</th>
                    <th>Período</th>
                    <th>Meta</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        async function loadHouses() {
            const res = await fetch('/api/houses');
            const houses = await res.json();
            const select = document.getElementById('house-select');
            select.innerHTML = '<option value="">Selecione...</option>';
            houses.forEach(h => {
                const opt = document.createElement('option');
                opt.value = h.id;
                opt.textContent = h.name;
                select.appendChild(opt);
            });
        }

        async function loadMetas() {
            const res = await fetch('/api/admin/get-metas');
            const metas = await res.json();
            const tbody = document.querySelector('#metas-table tbody');
            tbody.innerHTML = '';
            metas.forEach(m => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${m.house_name}</td>
                    <td>${m.month}/${m.year}</td>
                    <td>${m.target} meinhas</td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('form-meta').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            const data = {
                house_id: formData.get('house_id'),
                month: formData.get('month'),
                year: parseInt(formData.get('year')),
                target: parseInt(formData.get('target')),
                admin_id: user.id,
                admin_role: user.role
            };

            const res = await fetch('/api/admin/set-meta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                alert('Meta salva com sucesso!');
                loadMetas();
            } else {
                const err = await res.json();
                alert('Erro: ' + err.error);
            }
        });

        loadHouses();
        loadMetas();
    </script>
</body>
</html>
